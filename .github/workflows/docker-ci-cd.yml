      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: Push to Docker Hub
      #   run: |
      #     docker push your-dockerhub-username/docker-node-app:latest

      # Option 2: Deploy to AWS ECS (uncomment and configure)
